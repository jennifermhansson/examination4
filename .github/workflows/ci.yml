name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install shared dependencies
        run: bun install
        working-directory: shared

      - name: Run unit tests
        run: bun test tests/unit

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        # Pass secrets through the env: block (not inline) so values with
        # special characters are written verbatim. Fail fast with a clear
        # message if any secret is empty: postgres exits with code 1 when
        # POSTGRES_PASSWORD is blank, which otherwise surfaces only as the
        # cryptic "dependency failed to start" error.
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        run: |
          if [ -z "$POSTGRES_USER" ] || [ -z "$POSTGRES_PASSWORD" ] || [ -z "$POSTGRES_DB" ]; then
            echo "::error::A POSTGRES_* secret is empty in this job. If the secrets are defined under a GitHub Environment or as Organization secrets, this job cannot read them without 'environment:' / repo access — move them to Repository secrets or add the environment to the job."
            exit 1
          fi
          {
            echo "POSTGRES_USER=$POSTGRES_USER"
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD"
            echo "POSTGRES_DB=$POSTGRES_DB"
          } >> .env

      - name: Use CI nginx config
        run: cp nginx/nginx.ci.conf nginx/nginx.conf

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for nginx
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost/api/health; then
              echo "System is up"
              exit 0
            fi
            echo "Attempt $i failed, waiting..."
            docker compose ps
            sleep 5
          done
          echo "Stack failed to start"
          docker compose logs
          exit 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run integration tests
        run: bun test tests/integration
        env:
          E2E_BASE_URL: http://localhost

      - name: Run e2e tests
        run: bun test tests/e2e
        env:
          E2E_BASE_URL: http://localhost

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down -v
